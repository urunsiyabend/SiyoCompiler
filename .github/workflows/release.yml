name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            archive: tar.gz
          - os: macos-14
            platform: macos-arm64
            archive: tar.gz
          - os: windows-latest
            platform: windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Extract version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set Maven version
      shell: bash
      run: mvn -B versions:set "-DnewVersion=${{ steps.version.outputs.VERSION }}" -DgenerateBackupPoms=false

    - name: Build
      run: mvn -B package -DskipTests

    - name: Create bundled JRE with jlink
      shell: bash
      run: |
        jlink \
          --add-modules ALL-MODULE-PATH \
          --output runtime \
          --strip-debug \
          --no-man-pages \
          --no-header-files \
          --compress zip-6

    - name: Bundle distribution (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        DIST="siyo-${VERSION}-${{ matrix.platform }}"
        mkdir -p "${DIST}/bin" "${DIST}/lib"

        cp target/siyo-compiler-${VERSION}.jar "${DIST}/lib/siyoc.jar"
        mv runtime "${DIST}/runtime"

        # Wrapper script
        cat > "${DIST}/bin/siyoc" << 'WRAPPER'
        #!/bin/sh
        set -e
        SIYO_HOME="$(cd "$(dirname "$0")/.." && pwd)"
        exec "$SIYO_HOME/runtime/bin/java" -jar "$SIYO_HOME/lib/siyoc.jar" "$@"
        WRAPPER
        sed -i.bak 's/^        //' "${DIST}/bin/siyoc" && rm -f "${DIST}/bin/siyoc.bak"
        chmod +x "${DIST}/bin/siyoc"

        tar czf "${DIST}.tar.gz" "${DIST}"

    - name: Bundle distribution (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        DIST="siyo-${VERSION}-${{ matrix.platform }}"
        mkdir -p "${DIST}/bin" "${DIST}/lib"

        cp target/siyo-compiler-${VERSION}.jar "${DIST}/lib/siyoc.jar"
        mv runtime "${DIST}/runtime"

        # Wrapper script
        printf '@echo off\r\nset "SIYO_HOME=%%~dp0.."\r\n"%%SIYO_HOME%%\\runtime\\bin\\java.exe" -jar "%%SIYO_HOME%%\\lib\\siyoc.jar" %%*\r\n' > "${DIST}/bin/siyoc.cmd"

        7z a -tzip "${DIST}.zip" "${DIST}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.platform }}
        path: siyo-*-${{ matrix.platform }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Generate release notes
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        cat > release-notes.md << EOF
        ## Siyo ${VERSION}

        ### Quick Install

        **Linux / macOS:**
        \`\`\`bash
        curl -fsSL https://raw.githubusercontent.com/urunsiyabend/SiyoCompiler/master/install.sh | sh
        \`\`\`

        **Windows (PowerShell):**
        \`\`\`powershell
        irm https://raw.githubusercontent.com/urunsiyabend/SiyoCompiler/master/install.ps1 | iex
        \`\`\`

        ### Manual Install

        Download the archive for your platform, extract it, and add \`bin/\` to your PATH.
        No Java installation required — a bundled JRE is included.

        ### Usage
        \`\`\`bash
        siyoc new my-app       # create project
        cd my-app && siyoc run # build & run
        siyoc run file.siyo    # run single file
        siyoc repl             # interactive REPL
        \`\`\`

        ### Uninstall
        \`\`\`bash
        rm -rf ~/.siyo   # Linux/macOS
        \`\`\`

        See [GRAMMAR.md](https://github.com/urunsiyabend/SiyoCompiler/blob/v${VERSION}/GRAMMAR.md) for the language reference.
        EOF
        sed -i 's/^        //' release-notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Siyo ${{ steps.version.outputs.VERSION }}
        body_path: release-notes.md
        files: |
          dist/*
